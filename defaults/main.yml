---
docker_apt_gpg_key: "{{ docker_repo_url }}/{{ ansible_facts['distribution'] | lower }}/gpg"
docker_apt_dist: "{{ ansible_facts['distribution'] | lower }}"
docker_apt_repository: "{{ docker_repo_url }}/{{ docker_apt_dist }}"
docker_data_dir: /opt/docker
docker_debug: false
docker_edition: ce    # 'ce' (Community Edition) or 'ee' (Enterprise Edition)
docker_group_members: []
docker_log_cache_compress: true
docker_log_cache_files: 5
docker_log_cache_size: 20m
docker_log_local_compress: true
docker_log_local_files: 3
docker_log_local_size: 10m
docker_log_gelf: false
docker_log_gelf_url: ''
docker_min_api_version: 1.24
docker_min_api_version_override: false
docker_networks: []
  # - network1
  # - network2
docker_repo_url: https://download.docker.com/linux
docker_yum_dist: "{{ (ansible_facts['distribution'] == 'Fedora') | ternary('fedora','centos') }}"
docker_yum_repo_url: "{{ docker_repo_url }}/{{ docker_yum_dist }}/docker-ce.repo"
docker_yum_gpg_key: "{{ docker_repo_url }}/centos/gpg"
