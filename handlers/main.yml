---
- name: Update APT Cache
  ansible.builtin.apt:
    update_cache: true

- name: Update GRUB
  ansible.builtin.shell: /usr/sbin/update-grub

- name: Reboot Host
  ansible.builtin.reboot:
    reboot_timeout: 600

- name: Restart Docker
  ansible.builtin.service:
    name: docker
    state: restarted
